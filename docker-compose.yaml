services:
  app:
    build: ./backend
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/html/public/spa
    depends_on:
      - app
      - frontend

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"

volumes:
  db_data:
